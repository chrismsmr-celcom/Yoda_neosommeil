<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoda Travel Agent - DeepSeek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .badge {
            display: inline-block;
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border: 1px solid rgba(52, 211, 153, 0.3);
        }

        .mic-container {
            position: relative;
            margin: 30px 0;
        }

        #micBtn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        #micBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.4);
        }

        #micBtn:active {
            transform: scale(0.95);
        }

        #micBtn.recording {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #status {
            margin-top: 15px;
            color: #94a3b8;
            font-size: 1rem;
            min-height: 24px;
        }

        #status.success {
            color: #34d399;
        }

        #status.error {
            color: #ef4444;
        }

        .result-container {
            margin-top: 30px;
            text-align: left;
        }

        .result-container h3 {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        #result {
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            color: #34d399;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            min-height: 100px;
            border: 1px solid rgba(52, 211, 153, 0.1);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #result.error {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .loading {
            display: none;
            margin: 10px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .feature {
            background: rgba(15, 23, 42, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🧘 Yoda Travel AI</h2>
    <div class="badge">⚡ Propulsé par DeepSeek</div>
    <p class="subtitle">"Parle, et je trouverai ton chemin..."</p>

    <div class="features">
        <span class="feature">🗣️ Vocal</span>
        <span class="feature">✈️ Vols</span>
        <span class="feature">🏨 Hôtels</span>
        <span class="feature">🤖 DeepSeek</span>
    </div>

    <div class="mic-container">
        <button id="micBtn">
            🎙️ Parler à Yoda
        </button>
        <div id="status">Prêt à t'écouter...</div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color: #94a3b8; margin-top: 10px;">Yoda réfléchit avec DeepSeek...</p>
    </div>

    <div class="result-container">
        <h3>📋 Données extraites</h3>
        <pre id="result">En attente de ta voix...</pre>
    </div>
</div>

<script>
    // DOM Elements
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const loading = document.getElementById('loading');

    // Vérification du support du navigateur
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        status.textContent = "❌ Votre navigateur ne supporte pas la reconnaissance vocale";
        status.className = 'error';
        micBtn.disabled = true;
        micBtn.style.opacity = '0.5';
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    let isRecording = false;

    // Gestionnaire du bouton
    micBtn.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
            return;
        }

        try {
            recognition.start();
            isRecording = true;
            micBtn.classList.add('recording');
            micBtn.textContent = '⏹️ Arrêter';
            status.textContent = '🎤 Yoda écoute...';
            status.className = '';
            result.textContent = 'En attente de la réponse de DeepSeek...';
            result.className = '';
            loading.classList.remove('active');
        } catch (error) {
            console.error('Erreur de démarrage:', error);
            status.textContent = '❌ Erreur: Impossible de démarrer le micro';
            status.className = 'error';
            resetButton();
        }
    });

    // Résultat de la reconnaissance
    recognition.onresult = async (event) => {
        const voiceText = event.results[0][0].transcript;
        status.textContent = `💬 Tu as dit : "${voiceText}"`;
        status.className = 'success';
        resetButton();
        loading.classList.add('active');

        try {
            // Envoi au backend
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text: voiceText }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);
            const resData = await response.json();

            if (resData.success) {
                result.textContent = JSON.stringify(resData.data, null, 2);
                result.className = '';
                status.textContent = `✅ Analyse DeepSeek réussie !`;
                status.className = 'success';
            } else {
                result.textContent = `❌ ${resData.error || 'Erreur inconnue'}`;
                result.className = 'error';
                status.textContent = `⚠️ ${resData.error || 'Erreur'}`;
                status.className = 'error';
            }
        } catch (error) {
            console.error('Erreur réseau:', error);
            result.textContent = '❌ Erreur de connexion au serveur DeepSeek';
            result.className = 'error';
            status.textContent = '🔌 Problème de connexion';
            status.className = 'error';
        } finally {
            loading.classList.remove('active');
        }
    };

    // Gestion des erreurs de reconnaissance
    recognition.onerror = (event) => {
        console.error('Erreur reconnaissance:', event.error);
        let message = '❌ Erreur de micro';
        
        switch(event.error) {
            case 'not-allowed':
                message = '❌ Accès au micro refusé';
                break;
            case 'no-speech':
                message = '🔇 Aucune parole détectée';
                break;
            case 'audio-capture':
                message = '❌ Aucun micro trouvé';
                break;
            case 'network':
                message = '🔌 Problème réseau';
                break;
        }

        status.textContent = message;
        status.className = 'error';
        resetButton();
        loading.classList.remove('active');
    };

    // Fin de la reconnaissance
    recognition.onend = () => {
        resetButton();
    };

    // Réinitialisation du bouton
    function resetButton() {
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎙️ Parler à Yoda';
        
        if (status.textContent.includes('écoute') || status.textContent.includes('En attente')) {
            status.textContent = 'Prêt à t\'écouter...';
            status.className = '';
        }
    }

    // Test de connexion au serveur au chargement
    async function testConnection() {
        try {
            const response = await fetch('/api/health');
            if (response.ok) {
                const data = await response.json();
                console.log(`✅ Serveur connecté - Provider: ${data.provider}`);
            }
        } catch (error) {
            console.warn('⚠️ Serveur inaccessible');
            status.textContent = '⚠️ Connexion au serveur...';
        }
    }

    testConnection();
</script>

</body>
</html>
